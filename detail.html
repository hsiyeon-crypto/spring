<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>서울 벚꽃 명소 상세</title>
  <style>
    :root {
      --card: #ffffff;
      --text: #2f2a2d;
      --muted: #6d6369;
      --primary: #ff6fae;
      --border: #f3c8dd;
      --shadow: 0 10px 25px rgba(255, 111, 174, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", "Noto Sans KR", Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #fffafc 0%, #fff3f8 100%);
    }

    .container {
      width: min(900px, 92%);
      margin: 0 auto;
      padding: 28px 0 56px;
    }

    .top-actions {
      margin-bottom: 16px;
    }

    .back-link {
      display: inline-block;
      text-decoration: none;
      color: #b8286a;
      font-weight: 700;
      border: 1px solid #ffd0e5;
      border-radius: 999px;
      padding: 8px 14px;
      background: #fff;
    }

    .detail-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .place-image {
      width: 100%;
      height: clamp(280px, 42vw, 460px);
      object-fit: cover;
      display: block;
      border-bottom: 1px solid #ffd0e5;
    }

    .content {
      padding: 20px;
    }

    h1 {
      margin: 0 0 14px;
      color: #be2c70;
      font-size: clamp(1.5rem, 2.5vw, 2.1rem);
    }

    .info-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 10px;
    }

    .info-item {
      border: 1px solid #ffd9e9;
      border-radius: 12px;
      padding: 12px;
      background: #fffafc;
    }

    .label {
      font-weight: 700;
      color: #a92f67;
      margin-right: 6px;
    }

    .value {
      color: #4f4950;
      line-height: 1.55;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-actions">
      <a class="back-link" href="index.html">메인으로 돌아가기</a>
    </div>

    <section class="detail-card">
      <img id="place-image" class="place-image" src="" alt="" />
      <div class="content">
        <h1 id="place-name"></h1>
        <ul class="info-list">
          <li class="info-item"><span class="label">기간</span><span id="place-period" class="value"></span></li>
          <li class="info-item"><span class="label">장소</span><span id="place-location" class="value"></span></li>
          <li class="info-item"><span class="label">주요행사</span><span id="place-event" class="value"></span></li>
          <li class="info-item"><span class="label">벚꽃 특징</span><span id="place-feature" class="value"></span></li>
          <li class="info-item"><span class="label">팁</span><span id="place-tip" class="value"></span></li>
        </ul>
      </div>
    </section>
  </div>

  <script>
    const places = {
      gyeongbokgung: {
        name: "경복궁",
        image: "assets/%EA%B2%BD%EB%B3%B5.jpg",
        period: "3월 말 ~ 4월 중순",
        location: "서울 종로구 사직로 161",
        event: "야간개장(시즌 운영, 5월~6월), 고궁 해설 프로그램",
        feature: "전통 궁궐 건축과 수양벚꽃이 어우러지는 고즈넉한 풍경",
        tip: "오전 일찍 방문하면 비교적 한적하며 사진 촬영이 수월합니다."
      },
      namsantower: {
        name: "남산타워",
        image: "assets/%EB%82%A8%EC%82%B0.jpg",
        period: "3월 말 ~ 4월 초",
        location: "서울 용산구 남산공원길 105",
        event: "남산 벚꽃 산책 코스, 전망대 야경 관람, 도심을 한눈에 내려다보는 케이블카",
        feature: "도심 전망과 벚꽃길을 동시에 즐길 수 있는 입체적인 코스",
        tip: "케이블카 대기시간이 길 수 있어 평일 오후 방문을 추천드립니다."
      },
      yeouido: {
        name: "여의도",
        image: "assets/%EC%97%AC%EC%9D%98%EB%8F%84.jpg",
        period: "4월 초 ~ 4월 중순",
        location: "서울 영등포구 여의서로 일대",
        event: "여의도 봄꽃축제, 한강 야간 산책",
        feature: "한강을 따라 길게 이어지는 대규모 벚꽃 가로수길",
        tip: "주말에는 매우 혼잡하므로 대중교통 이용이 편리합니다."
      },
      childrensgrandpark: {
        name: "어린이 대공원",
        image: "assets/%EC%96%B4%EB%A6%B0%EC%9D%B4.jpg",
        period: "3월 말 ~ 4월 중순",
        location: "서울 광진구 능동로 216",
        event: "가족 피크닉, 호수 산책, 동물원 연계 방문",
        feature: "넓은 잔디와 공원 동선 곳곳에서 만나는 벚꽃 쉼터",
        tip: "돗자리와 간단한 간식을 준비하면 체류 시간이 더 즐거워집니다."
      },
      seoulforest: {
        name: "서울숲",
        image: "assets/%EC%84%9C%EC%9A%B8%EC%88%B2.jpg",
        period: "3월 말 ~ 4월 중순",
        location: "서울 성동구 뚝섬로 273",
        event: "포토존 산책, 인근 카페 거리 연계 코스",
        feature: "도심 빌딩과 자연 풍경이 대비되는 감성 벚꽃 뷰",
        tip: "서울숲역 출구 인근의 메인 산책로부터 이동하면 동선이 편합니다."
      },
      jamsillake: {
        name: "석촌호수",
        image: "assets/%EB%8B%A4%EC%9A%B4%EB%A1%9C%EB%93%9C.jpg",
        period: "4월 초 ~ 4월 중순",
        location: "서울 송파구 잠실동 석촌호수 일대",
        event: "호수 둘레길 산책, 야간 벚꽃 뷰",
        feature: "호수 테두리를 따라 이어지는 벚꽃 라인이 장관을 이룸",
        tip: "해 질 무렵 방문하면 낮 풍경과 야경을 모두 즐길 수 있습니다."
      }
    };

    const params = new URLSearchParams(window.location.search);
    const placeId = params.get("place");
    const selected = places[placeId] || places.gyeongbokgung;

    document.title = selected.name + " 상세 정보";
    document.getElementById("place-name").textContent = selected.name;
    document.getElementById("place-image").src = selected.image;
    document.getElementById("place-image").alt = selected.name;
    document.getElementById("place-period").textContent = selected.period;
    document.getElementById("place-location").textContent = selected.location;
    document.getElementById("place-event").textContent = selected.event;
    document.getElementById("place-feature").textContent = selected.feature;
    document.getElementById("place-tip").textContent = selected.tip;
  </script>
</body>
</html>
